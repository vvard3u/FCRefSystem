spring:
  application:
    name: fc-ref-system
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/fcref}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    username: ${DATABASE_USERNAME:fcref}
    password: ${DATABASE_PASSWORD:fcref}
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: always

debug: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  invitation-ttl-days: ${INVITATION_TTL_DAYS:30}
  member-invitation-quota: ${MEMBER_INVITATION_QUOTA:3}
