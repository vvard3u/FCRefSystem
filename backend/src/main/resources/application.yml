spring:
  application:
    name: fc-ref-system
  datasource:
    url: jdbc:h2:mem:fcref;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: always

debug: false

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  invitation-ttl-days: ${INVITATION_TTL_DAYS:30}
  member-invitation-quota: ${MEMBER_INVITATION_QUOTA:3}
