<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FCRefSystem MVP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="/assets/logo.svg" alt="" class="brand__mark">
        <div>
          <strong>FCRefSystem</strong>
          <span>Отбор в БК</span>
        </div>
      </div>
      <nav class="nav" id="nav" aria-label="Разделы"></nav>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <h1 id="view-title">FCRefSystem</h1>
        </div>
        <div id="auth-panel" class="auth-panel"></div>
      </header>

      <main id="app" class="content" tabindex="-1"></main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
