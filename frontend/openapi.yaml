openapi: 3.0.3
info:
  title: FCRefSystem MVP API
  version: 0.1.0
  description: REST API for referral candidate selection MVP.
servers:
  - url: http://localhost:8080
paths:
  /api/snapshot:
    get:
      summary: Current MVP state
      responses:
        "200":
          description: Users, invitations, candidates, regulations and event log.
  /api/invitations:
    post:
      summary: UC-01 Create referral invitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "200":
          description: Invitation created.
        "409":
          description: Quota exhausted or business rule failed.
  /api/invitations/activate:
    post:
      summary: Activate invitation and register candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, fullName]
              properties:
                token:
                  type: string
                fullName:
                  type: string
      responses:
        "200":
          description: Candidate created.
  /api/regulations:
    post:
      summary: UC-02 Create active selection regulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegulationRequest"
      responses:
        "200":
          description: Active regulation created.
  /api/candidates/{candidateId}/stage-results:
    post:
      summary: UC-05 Submit current stage result
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorUserId, result]
              properties:
                actorUserId:
                  type: string
                result:
                  type: string
                requestId:
                  type: string
      responses:
        "200":
          description: Stage result saved.
  /api/candidates/{candidateId}/verdicts:
    post:
      summary: Record stage verdict
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorUserId, verdict, report]
              properties:
                actorUserId:
                  type: string
                verdict:
                  type: string
                  enum: [PASSED, FAILED, RETRY]
                report:
                  type: string
      responses:
        "200":
          description: Verdict saved.
  /api/candidates/{candidateId}/voting:
    post:
      summary: Open voting
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        $ref: "#/components/requestBodies/Actor"
      responses:
        "200":
          description: Voting session opened.
  /api/candidates/{candidateId}/votes:
    post:
      summary: UC-03 Cast vote
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorUserId, choice, reason]
              properties:
                actorUserId:
                  type: string
                choice:
                  type: string
                  enum: [SUPPORT, REJECT]
                reason:
                  type: string
      responses:
        "200":
          description: Vote accepted.
  /api/candidates/{candidateId}/voting/close:
    post:
      summary: Close voting and calculate result
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        $ref: "#/components/requestBodies/Actor"
      responses:
        "200":
          description: Voting closed.
  /api/candidates/{candidateId}/complaints:
    post:
      summary: Create complaint for candidate
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorUserId, reason]
              properties:
                actorUserId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Complaint saved.
  /api/candidates/{candidateId}/blocks:
    post:
      summary: UC-04 Block candidate
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorUserId, category, reason]
              properties:
                actorUserId:
                  type: string
                category:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Candidate blocked.
components:
  parameters:
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
  requestBodies:
    Actor:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [actorUserId]
            properties:
              actorUserId:
                type: string
  schemas:
    CreateInvitationRequest:
      type: object
      required: [actorUserId]
      properties:
        actorUserId:
          type: string
        comment:
          type: string
        requestId:
          type: string
    CreateRegulationRequest:
      type: object
      required: [actorUserId, name, stages]
      properties:
        actorUserId:
          type: string
        name:
          type: string
        description:
          type: string
        stages:
          type: array
          items:
            type: object
            required: [id, name, type, attemptLimit, dueDays, requiresSubmission]
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
                enum: [FORM, TASK, INTERVIEW, VOTE]
              attemptLimit:
                type: integer
                minimum: 1
              dueDays:
                type: integer
                minimum: 1
              thresholdPercent:
                type: integer
                nullable: true
              criteria:
                type: string
              requiresSubmission:
                type: boolean
