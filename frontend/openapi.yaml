openapi: 3.0.3
info:
  title: FCRefSystem MVP API
  version: 0.1.0
  description: REST API for referral candidate selection MVP.
servers:
  - url: http://localhost:8080
security:
  - basicAuth: []
paths:
  /api/session:
    get:
      summary: Current authenticated user
      responses:
        "200":
          description: User account and roles.
        "401":
          description: Basic Auth credentials are missing or invalid.
  /api/snapshot:
    get:
      summary: Current MVP state
      responses:
        "200":
          description: Users, invitations, candidates, regulations and event log.
        "401":
          description: Basic Auth credentials are missing or invalid.
  /api/invitations:
    post:
      summary: UC-01 Create referral invitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "200":
          description: Invitation created by current MEMBER.
        "403":
          description: Current user is not an active club member.
        "409":
          description: Quota exhausted or business rule failed.
  /api/invitations/activate:
    post:
      security: []
      summary: Activate invitation and register candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateInvitationRequest"
      responses:
        "200":
          description: Candidate created and Basic Auth credentials issued.
  /api/regulations:
    post:
      summary: UC-02 Create active selection regulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegulationRequest"
      responses:
        "200":
          description: Active regulation created by current ADMIN.
        "403":
          description: Current user is not an administrator.
  /api/candidates/{candidateId}/stage-results:
    post:
      summary: UC-05 Submit current stage result
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitStageResultRequest"
      responses:
        "200":
          description: Stage result saved by candidate owner or ADMIN.
  /api/candidates/{candidateId}/verdicts:
    post:
      summary: Record stage verdict
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordVerdictRequest"
      responses:
        "200":
          description: Verdict saved by assigned interviewer or ADMIN.
  /api/candidates/{candidateId}/voting:
    post:
      summary: Open voting
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      responses:
        "200":
          description: Voting session opened by ADMIN.
  /api/candidates/{candidateId}/votes:
    post:
      summary: UC-03 Cast vote
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastVoteRequest"
      responses:
        "200":
          description: Vote accepted from current PRIVILEGED_MEMBER.
  /api/candidates/{candidateId}/voting/close:
    post:
      summary: Close voting and calculate result
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      responses:
        "200":
          description: Voting closed by ADMIN.
  /api/candidates/{candidateId}/complaints:
    post:
      summary: Create complaint for candidate
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintRequest"
      responses:
        "200":
          description: Complaint saved by current PRIVILEGED_MEMBER.
  /api/candidates/{candidateId}/blocks:
    post:
      summary: UC-04 Block candidate
      parameters:
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockCandidateRequest"
      responses:
        "200":
          description: Candidate blocked by assigned interviewer or ADMIN.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  parameters:
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
  schemas:
    CreateInvitationRequest:
      type: object
      properties:
        comment:
          type: string
        requestId:
          type: string
    ActivateInvitationRequest:
      type: object
      required: [token, fullName]
      properties:
        token:
          type: string
        fullName:
          type: string
    CreateRegulationRequest:
      type: object
      required: [name, stages]
      properties:
        name:
          type: string
        description:
          type: string
        stages:
          type: array
          items:
            $ref: "#/components/schemas/SelectionStage"
    SubmitStageResultRequest:
      type: object
      required: [result]
      properties:
        result:
          type: string
        requestId:
          type: string
    RecordVerdictRequest:
      type: object
      required: [verdict, report]
      properties:
        verdict:
          type: string
          enum: [PASSED, FAILED, RETRY]
        report:
          type: string
    CastVoteRequest:
      type: object
      required: [choice, reason]
      properties:
        choice:
          type: string
          enum: [SUPPORT, REJECT]
        reason:
          type: string
    ComplaintRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
    BlockCandidateRequest:
      type: object
      required: [category, reason]
      properties:
        category:
          type: string
        reason:
          type: string
    SelectionStage:
      type: object
      required: [id, name, type, attemptLimit, dueDays, requiresSubmission]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [FORM, TASK, INTERVIEW, VOTE]
        attemptLimit:
          type: integer
          minimum: 1
        dueDays:
          type: integer
          minimum: 1
        thresholdPercent:
          type: integer
          nullable: true
        criteria:
          type: string
        requiresSubmission:
          type: boolean
