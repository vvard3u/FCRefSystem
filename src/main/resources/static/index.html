<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FCRefSystem MVP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="/assets/logo.svg" alt="" class="brand__mark">
        <div>
          <strong>FCRefSystem</strong>
          <span>Отбор в БК</span>
        </div>
      </div>
      <nav class="nav" aria-label="Основные сценарии">
        <button class="nav__item is-active" type="button" data-view="invitations">Приглашения</button>
        <button class="nav__item" type="button" data-view="regulation">Регламент</button>
        <button class="nav__item" type="button" data-view="voting">Голосование</button>
        <button class="nav__item" type="button" data-view="blocking">Блокировка</button>
        <button class="nav__item" type="button" data-view="stage">Этап отбора</button>
        <button class="nav__item" type="button" data-view="journal">Журнал</button>
      </nav>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="view-kicker">UC-01</p>
          <h1 id="view-title">Создание реферального приглашения</h1>
        </div>
        <label class="actor-select">
          <span>Актор</span>
          <select id="actor-select"></select>
        </label>
      </header>

      <main id="app" class="content" tabindex="-1"></main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/app.js"></script>
</body>
</html>
