name: CI

on:
  push:
    branches:
      - main
      - mvp
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Checkstyle
        run: mvn -B -pl backend checkstyle:check

      - name: Run tests
        run: mvn -B test

      - name: Build package
        run: mvn -B package -DskipTests

  frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint
